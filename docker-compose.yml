services:
  scngs:
    build:
      context: .
      network: host
    ports:
      # Default to all interfaces for remote selfhost access.
      - "0.0.0.0:8000:8000"
    volumes:
      - scngs-data:/data
    environment:
      - DEPLOY_MODE=selfhost
      - DATABASE_URL=sqlite:////data/scngs.db
      - SCNGS_DATA_DIR=/data
volumes:
  scngs-data:
